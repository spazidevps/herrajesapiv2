    <!-- 🟡 SUBTÍTULO -->
    <h3 style="text-align: center; color: #004684; margin-bottom: 20px;">

    <!-- 🔷 CARD AZUL -->

        <p style="color: #fff; font-size: 18px; margin-bottom: 20px;">
            Ingresa el peso en Kilogramos

        <p style="color: #fff; font-size: 18px; margin-bottom: 20px;">

    <!-- <div class="calculadora">
        <h2>Bienvenido a la Calculadora de Resortes</h2>

        <h3>Ingresa la Altura en metros lineales</h3> -->

        <form action="/resortes/" method="post" onsubmit="return validarResortes()">
            <div>
                <!-- <input type="text" name="peso" placeholder="Peso (kg)"> -->
                <input type="text" id="peso" name="peso" placeholder="Peso (kg)"> 
                <!--<input type="number" step="any" id="peso" name="peso" placeholder="Peso (kg)">-->
            </div>
         
            <div>
                <!-- <input type="text" name="altura" placeholder="Altura (m)"> -->

                <!--<input type="number" step="any" id="altura" name="altura" placeholder="Altura (m)">-->
            </div>
            <div>
                <input type="submit" value="Calcular">
            </div>

    <!-- </div> -->










    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    

<script>
    window.onload = function() {
        if (window.opener) { // Verifica si la ventana tiene una ventana padre (opener)
            document.body.classList.add("zoom-out"); // Añade una clase para aplicar el "zoom out"
        }
    };


 //función agregada el 13/03/2026
    function validarResortes(){

        let peso = parseFloat(document.getElementById("peso").value);
        let altura = parseFloat(document.getElementById("altura").value);

        // Validar campos vacíos
        if(isNaN(peso) || isNaN(altura)){
            alert("Debes ingresar el peso y la altura del portón.");
            return false;
        }

        let errores = [];

        // Detectar centímetros en altura
        if(altura > 10){
            errores.push("La altura parece estar en centímetros. Ingresa el valor en metros (ejemplo: 2.50 o 2.0).");
        }

        if(errores.length > 0){
            alert(errores.join("\n"));
            return false;
        }

        return true;
    }
    </script>
{% endblock %}
