<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Resortes</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>



<body>

    <style>
        .zoom-out {
            transform: scale(0.7); /* Escala el contenido al 70% de su tamaño original */
            transform-origin: top left; /* Asegura que el escalado se aplique desde la esquina superior izquierda */
            width: 142.85%; /* Ajusta el ancho al inverso del escalado para compensar la reducción */
            height: auto; /* Ajusta la altura automáticamente */
            overflow: hidden; /* Oculta cualquier contenido fuera del área visible */
        }
        </style>
        





    <div class="header">
        <div class="header-content">
            <div class="header-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
            </div>
            <ul class="nav">
                <li><a href="/resortes/">Inicio</a></li>
                <!-- Otros elementos de navegación -->
                <!-- Otros elementos de navegación -->
            </ul>
        </div>
    </div>

    <div class="calculadora">
        <h2>Bienvenido a la Calculadora de Resortes</h2>
        <h3>Ingresa el peso en Kilogramos</h3>
        <h3>Ingresa la Altura en metros lineales</h3>
        <!-- <form action="/resortes/" method="post"> -->
        <form action="/resortes/" method="post" onsubmit="return validarResortes()">
            <div>
                <!-- <input type="text" name="peso" placeholder="Peso (kg)"> -->
                <input type="text" id="peso" name="peso" placeholder="Peso (kg)"> 
                <!--<input type="number" step="any" id="peso" name="peso" placeholder="Peso (kg)">-->
            </div>
         
            <div>
                <!-- <input type="text" name="altura" placeholder="Altura (m)"> -->
                <input type="text" id="altura" name="altura" placeholder="Altura (m)"> 
                <!--<input type="number" step="any" id="altura" name="altura" placeholder="Altura (m)">-->
            </div>
            <div>
                <input type="submit" value="Calcular">
            </div>
        </form>
    </div>
    
</body>


<script>
    window.onload = function() {
        if (window.opener) { // Verifica si la ventana tiene una ventana padre (opener)
            document.body.classList.add("zoom-out"); // Añade una clase para aplicar el "zoom out"
        }
    };


 //función agregada el 13/03/2026
    function validarResortes(){

        let peso = parseFloat(document.getElementById("peso").value);
        let altura = parseFloat(document.getElementById("altura").value);

        // Validar campos vacíos
        if(isNaN(peso) || isNaN(altura)){
            alert("Debes ingresar el peso y la altura del portón.");
            return false;
        }

        let errores = [];

        // Detectar centímetros en altura
        if(altura > 20){
            errores.push("La altura parece estar en centímetros. Ingresa el valor en metros (ejemplo: 2.50).");
        }

        if(errores.length > 0){
            alert(errores.join("\n"));
            return false;
        }

        return true;
    }
    </script>



    


</html>
