<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Spazi{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>

<body>

    <!-- HEADER UNIFICADO -->
    <div class="header">
        <div class="header-content">
            <div class="header-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">  <!--logo.png-->
            </div>
            <ul class="nav">
                <li><a href="/">Inicio</a></li>
                <li><a href="/resortes/">Calculadora</a></li>
            </ul>
        </div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div class="container" style="margin-top: 120px;">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
